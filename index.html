<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Trade AI - Canlı Sinyal</title>
  <style>
    body { background: #0d1117; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; }
    h1 { margin-top: 20px; color: #58a6ff; }
    .signal { font-size: 50px; font-weight: bold; margin: 20px; padding: 20px; }
    .wait { color: #888; }
    .long { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
    .short { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

    /* 📦 POZİSYON KUTUSU */
    #box {
      margin: 20px auto;
      width: 260px;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #161b22;
      font-size: 16px;
      text-align: left;
    }
  </style>
</head>

<body>

<h1>🔥 Trade AI Live Monitor</h1>

<div id="tradingview_widget"></div>

<div class="signal wait" id="signal-display">BEKLENİYOR...</div>

<div id="box">Sistem izleniyor...</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
  // 1. TradingView Widget
  new TradingView.widget({
    "container_id": "tradingview_widget",
    "width": "100%", "height": 400,
    "symbol": "BINANCE:BTCUSDT",
    "interval": "15",
    "theme": "dark",
    "style": "1",
    "locale": "tr"
  });

  // 2. FIREBASE BAĞLANTISI (Sitenin "beyni" burası)
  // Buradaki URL'i kendi Firebase URL'inle değiştirdiğinden emin ol!
  const FIREBASE_URL = "https://hnd-ai-default-rtdb.europe-west1.firebasebasedatabase.app/signal/status.json";

  async function updateSignal() {
    try {
      const response = await fetch(FIREBASE_URL);
      const data = await response.json();
      
      const el = document.getElementById("signal-display");
      const box = document.getElementById("box");
      
      // Gelen veriye göre ekranı güncelle
      if (data === "LONG") {
        el.innerText = "LONG POZİSYON";
        el.className = "signal long";
        box.style.border = "2px solid #00ff00";
        box.innerHTML = "🟢 <b>ALIM SİNYALİ</b><br>Durum: Aktif";
      } 
      else if (data === "SHORT") {
        el.innerText = "SHORT POZİSYON";
        el.className = "signal short";
        box.style.border = "2px solid #ff0000";
        box.innerHTML = "🔴 <b>SATIM SİNYALİ</b><br>Durum: Aktif";
      } 
      else {
        el.innerText = "BEKLEMEDE (WAIT)";
        el.className = "signal wait";
        box.style.border = "2px solid #333";
        box.innerHTML = "⏳ Sistem analiz yapıyor...";
      }
    } catch (e) {
      console.error("Bağlantı hatası:", e);
    }
  }

  // Her 3 saniyede bir Firebase'i kontrol et
  setInterval(updateSignal, 3000);
  updateSignal();
</script>

</body>
</html>
