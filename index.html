<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade AI Canlı Monitor</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f0f0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #header { padding: 20px; text-align: center; }
        #status { font-size: 50px; font-weight: bold; margin-top: 10px; }
        .LONG { color: #00ff00; }
        .SHORT { color: #ff0000; }
        .BEKLENİYOR { color: #888; font-size: 20px !important; }
    </style>
</head>
<body>

    <div id="header">
        <h1 style="color: #4a90e2;">🔥 Trade AI Live Monitor</h1>
        <div id="status" class="BEKLENİYOR">YÜKLENİYOR...</div>
    </div>

    <div class="tradingview-widget-container" style="height:500px; width:95%; margin-bottom: 20px;">
      <div class="tradingview-widget-container__widget" style="height:100%; width:100%;"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
      {
        "symbol": "BINANCE:BTCUSDT",
        "interval": "15",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "autosize": true
      }
      </script>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        // --- BURAYA KENDİ CONFIG BİLGİNİ YAPIŞTIR ---
        const firebaseConfig = {
            apiKey: "BURAYA_API_KEY",
            authDomain: "BURAYA_AUTH",
            projectId: "BURAYA_PROJECT_ID",
            storageBucket: "BURAYA_STORAGE",
            messagingSenderId: "BURAYA_SENDER_ID",
            appId: "BURAYA_APP_ID",
            databaseURL: "BURAYA_DATABASE_URL"
        };
        // -------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Veriyi 'status' üzerinden okuyoruz
        const statusRef = ref(db, 'status');
        const statusElement = document.getElementById('status');

        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                statusElement.innerText = data;
                statusElement.className = data; // Class'ı LONG veya SHORT yapar
            } else {
                statusElement.innerText = "BEKLENİYOR...";
                statusElement.className = "BEKLENİYOR";
            }
        });
    </script>
</body>
</html>
