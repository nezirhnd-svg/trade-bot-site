<!DOCTYPE html>
<html>
<head>
  <title>Trade AI</title>
  <style>
    body {
      background: #0d1117;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    h1 {
      margin-top: 20px;
    }
    .signal {
      font-size: 40px;
      margin: 20px;
    }
    .long { color: lime; }
    .short { color: red; }
  </style>
</head>

<body>

<h1>🔥 Trade AI Signal</h1>

<div id="chart"></div>

<div class="signal long" id="signal">
LONG
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 500,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "15",
  "theme": "dark",
  "style": "1",
  "locale": "tr"
});
</script>

</body>
</html>
<script>
function randomSignal() {
  let signal = Math.random() > 0.5 ? "LONG" : "SHORT";
  let el = document.getElementById("signal");

  el.innerText = signal;

  if(signal === "LONG"){
    el.className = "signal long";
  } else {
    el.className = "signal short";
  }
}

// 3 saniyede bir değişsin
setInterval(randomSignal, 3000);
</script>
